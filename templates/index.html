<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MovieMagic</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#000;
    color:white;
}

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:5rem;
    font-weight:800;
    animation:fadeUp 1s ease;
    margin-bottom:10px;
}

.hero p{
    font-size:1.5rem;
    letter-spacing:3px;
    margin-bottom:40px;
    color:#ccc;
    text-transform:uppercase;
}

.btn-primary{
    font-size:1rem;
    padding:12px 30px;
    border-radius:50px;
    background:#ff2c2c;
    color:white;
    text-decoration:none;
    display:inline-block;
    transition:0.3s;
}

.btn-primary:hover{
    background:#ff0000;
    transform:scale(1.05);
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>

<body>

<div class="hero">

<h1>MOVIE MAGIC</h1>

<p>You Experience The Cinema</p>

<a href="login.html" class="btn-primary">
GET STARTED
</a>

</div>

</body>
</html>
